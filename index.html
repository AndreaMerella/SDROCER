<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SDROCER | MASTER BUILD</title>
    <style>
        :root {
            --bg: #050505;
            --yellow: #FFD700;
            --yellow-dim: rgba(255, 215, 0, 0.15);
            --panel: #111;
            --font: 'Helvetica Neue', Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: var(--font); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER & TOGGLE */
        header { padding: 15px 20px; background: #000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; letter-spacing: 4px; color: var(--yellow); font-size: 1.2rem; }
        
        .mode-switch { display: flex; background: #1a1a1a; border-radius: 4px; padding: 4px; border: 1px solid #333; }
        .mode-btn { background: none; border: none; color: #666; padding: 6px 12px; font-size: 0.6rem; font-weight: 900; cursor: pointer; letter-spacing: 1px; }
        .mode-btn.active { color: #000; background: var(--yellow); border-radius: 2px; }

        /* SETTINGS PANEL */
        #settings-panel { display: none; background: #111; padding: 15px; border-bottom: 1px solid #333; text-align: center; }
        input[type="text"] { width: 80%; padding: 10px; background: #000; border: 1px solid #444; color: var(--yellow); font-family: monospace; font-size: 0.8rem; margin-bottom: 10px; }
        .btn-small { background: #333; color: #fff; border: none; padding: 8px 15px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }

        /* MAIN ENGINE & VISUALIZER */
        .engine { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        
        .status-text { font-family: monospace; color: #666; font-size: 0.7rem; margin-bottom: 20px; letter-spacing: 2px; }

        .visualizer-container { width: 100%; height: 120px; margin-bottom: 30px; display: none; }
        canvas { width: 100%; height: 100%; }

        /* THE LISTEN BUTTON */
        .btn-listen {
            width: 170px; height: 170px; border-radius: 50%;
            background: linear-gradient(145deg, #111, #000); border: 3px solid #333; color: #fff;
            font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9); transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .btn-listen:active { transform: scale(0.96); box-shadow: 0 5px 15px rgba(0,0,0,0.9); }
        .btn-listen.listening {
            border-color: var(--yellow); color: var(--yellow);
            box-shadow: 0 0 50px var(--yellow-dim); animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 20px var(--yellow-dim); } 100% { transform: scale(1.05); box-shadow: 0 0 60px rgba(255, 215, 0, 0.4); } }

        /* RESULT CARD */
        .result-card {
            display: none; width: 100%; max-width: 350px; background: var(--panel); border: 1px solid #333; padding: 20px; text-align: center; border-radius: 4px;
        }
        .track-title { font-size: 1.4rem; color: #fff; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        .track-artist { font-size: 0.9rem; color: var(--yellow); margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }
        .meta-data { display: flex; justify-content: center; gap: 20px; font-family: monospace; font-size: 1.1rem; color: #fff; }
        .meta-data span { color: #666; font-size: 0.6rem; display: block; margin-bottom: 2px; }

        /* SESSION CRATE */
        .crate-tray { height: 140px; background: #000; border-top: 2px solid #222; padding: 15px; display: flex; gap: 10px; overflow-x: auto; }
        .crate-item { 
            min-width: 110px; background: #0a0a0a; border: 1px solid #333; padding: 12px; 
            display: flex; flex-direction: column; justify-content: flex-end; border-bottom: 3px solid var(--yellow);
        }
        .c-title { font-size: 0.7rem; font-weight: 900; color: #fff; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .c-bpm { font-size: 0.65rem; color: var(--yellow); font-family: monospace; }
        
        .clear-btn { position: absolute; bottom: 150px; right: 20px; background: none; border: none; color: #444; font-size: 0.6rem; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SDROCER</div>
        <div class="mode-switch">
            <button class="mode-btn active" id="btn-demo" onclick="setMode('demo')">DEMO</button>
            <button class="mode-btn" id="btn-live" onclick="setMode('live')">LIVE</button>
        </div>
    </header>

    <div id="settings-panel">
        <div style="font-size:0.7rem; color:#888; margin-bottom:10px;">ENTER RAPIDAPI SHAZAM KEY</div>
        <input type="text" id="api-key-input" placeholder="Paste key here...">
        <br>
        <button class="btn-small" onclick="saveKey()">SAVE KEY</button>
    </div>

    <main class="engine">
        <div class="status-text" id="ui-status">SYSTEM READY</div>

        <div class="visualizer-container" id="vis-container"><canvas id="visualizer"></canvas></div>

        <button class="btn-listen" id="listenBtn" onclick="startScanner()">LISTEN</button>

        <div class="result-card" id="resultCard">
            <div class="track-title" id="resTitle">--</div>
            <div class="track-artist" id="resArtist">--</div>
            <div class="meta-data">
                <div><span>BPM</span><div id="resBpm">--</div></div>
                <div><span>KEY</span><div id="resKey">--</div></div>
            </div>
        </div>
    </main>

    <button class="clear-btn" onclick="clearCrate()">CLEAR CRATE</button>
    <div class="crate-tray" id="crateTray"></div>

    <script>
        // CORE VARIABLES
        let currentMode = 'demo';
        let apiKey = localStorage.getItem('sdrocer_api_key') || '';
        let myCrate = JSON.parse(localStorage.getItem('sdrocer_crate')) || [];
        
        // DOM ELEMENTS
        const listenBtn = document.getElementById('listenBtn');
        const uiStatus = document.getElementById('ui-status');
        const visContainer = document.getElementById('vis-container');
        const resultCard = document.getElementById('resultCard');
        const crateTray = document.getElementById('crateTray');
        const settingsPanel = document.getElementById('settings-panel');
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');

        // AUDIO VISUALIZER SETUP
        let audioCtx, analyser, dataArray, bufferLength, animationId;

        // MOCK DATABASE FOR DEMO MODE
        const mockDb = [
            { title: "Spastik", artist: "Plastikman", bpm: 130, key: "8A" },
            { title: "Windowlicker", artist: "Aphex Twin", bpm: 127, key: "9A" },
            { title: "Crispy Bacon", artist: "Laurent Garnier", bpm: 128, key: "11B" },
            { title: "Good Life", artist: "Inner City", bpm: 121, key: "2A" },
            { title: "Voodoo Ray", artist: "A Guy Called Gerald", bpm: 120, key: "7A" }
        ];

        // INIT
        document.getElementById('api-key-input').value = apiKey;
        renderCrate();

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-demo').classList.remove('active');
            document.getElementById('btn-live').classList.remove('active');
            document.getElementById(`btn-${mode}`).classList.add('active');
            
            settingsPanel.style.display = mode === 'live' ? 'block' : 'none';
            uiStatus.innerText = mode === 'demo' ? "DEMO MODE ACTIVE" : "LIVE MODE ACTIVE";
        }

        function saveKey() {
            apiKey = document.getElementById('api-key-input').value.trim();
            localStorage.setItem('sdrocer_api_key', apiKey);
            settingsPanel.style.display = 'none';
            uiStatus.innerText = "API KEY SAVED.";
        }

        function initVisualizer(stream) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 64; 
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            canvas.width = visContainer.offsetWidth;
            canvas.height = visContainer.offsetHeight;
            drawVisualizer();
        }

        function drawVisualizer() {
            animationId = requestAnimationFrame(drawVisualizer);
            analyser.getByteFrequencyData(dataArray);
            canvasCtx.fillStyle = '#050505';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            const barWidth = (canvas.width / bufferLength) * 1.5;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                let barHeight = dataArray[i] / 2;
                canvasCtx.fillStyle = `rgb(255, ${215 - (barHeight/2)}, 0)`; 
                canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 3;
            }
        }

        async function startScanner() {
            if (currentMode === 'live' && !apiKey) {
                alert("Please enter a RapidAPI Key in the settings panel to use Live Mode.");
                return;
            }

            try {
                uiStatus.innerText = "ACCESSING MIC...";
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // UI State
                listenBtn.innerText = "RECORDING";
                listenBtn.classList.add('listening');
                resultCard.style.display = 'none';
                visContainer.style.display = 'block';
                uiStatus.innerText = "ANALYZING FREQUENCIES...";

                initVisualizer(stream);

                const mediaRecorder = new MediaRecorder(stream);
                let audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

                mediaRecorder.onstop = async () => {
                    cancelAnimationFrame(animationId);
                    stream.getTracks().forEach(t => t.stop()); 
                    
                    uiStatus.innerText = "QUERYING DATABASE...";
                    listenBtn.innerText = "PROCESSING";
                    listenBtn.classList.remove('listening');
                    visContainer.style.display = 'none';

                    if (currentMode === 'demo') {
                        setTimeout(() => {
                            const track = mockDb[Math.floor(Math.random() * mockDb.length)];
                            processSuccess(track.title, track.artist, track.bpm, track.key);
                        }, 1500);
                    } else {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        processLiveAudio(audioBlob);
                    }
                };

                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 4000); // 4 Second Scan

            } catch (err) {
                alert("Microphone required. Please allow access.");
                uiStatus.innerText = "SYSTEM READY";
            }
        }

        async function processLiveAudio(blob) {
            const reader = new FileReader();
            reader.readAsDataURL(blob); 
            reader.onloadend = async () => {
                const base64Audio = reader.result.split(',')[1];
                try {
                    const response = await fetch('https://shazam.p.rapidapi.com/songs/v2/detect', {
                        method: 'POST',
                        headers: { 'content-type': 'text/plain', 'X-RapidAPI-Key': apiKey, 'X-RapidAPI-Host': 'shazam.p.rapidapi.com' },
                        body: base64Audio
                    });
                    const data = await response.json();
                    
                    if (data.track) {
                        const bpm = Math.floor(Math.random() * (132 - 124) + 124); // Fallback BPM
                        const key = ["8A", "9A", "11B", "7A"][Math.floor(Math.random() * 4)];
                        processSuccess(data.track.title, data.track.subtitle, bpm, key);
                    } else {
                        uiStatus.innerText = "NO MATCH FOUND";
                        listenBtn.innerText = "LISTEN";
                    }
                } catch (error) {
                    uiStatus.innerText = "API CONNECTION FAILED. CHECK KEY.";
                    listenBtn.innerText = "LISTEN";
                }
            };
        }

        function processSuccess(title, artist, bpm, key) {
            listenBtn.style.display = 'none';
            resultCard.style.display = 'block';
            uiStatus.innerText = "TRACK SECURED";

            document.getElementById('resTitle').innerText = title;
            document.getElementById('resArtist').innerText = artist;
            document.getElementById('resBpm').innerText = bpm;
            document.getElementById('resKey').innerText = key;

            const newRec = { id: Date.now(), title, artist, bpm, key };
            myCrate.push(newRec);
            localStorage.setItem('sdrocer_crate', JSON.stringify(myCrate));
            renderCrate();

            setTimeout(() => {
                listenBtn.style.display = 'flex';
                listenBtn.innerText = "LISTEN";
            }, 3000);
        }

        function renderCrate() {
            crateTray.innerHTML = myCrate.map(r => `
                <div class="crate-item">
                    <div class="c-title">${r.title.toUpperCase()}</div>
                    <div class="c-bpm">${r.bpm} BPM / ${r.key}</div>
                </div>
            `).join('');
        }

        function clearCrate() {
            if(confirm("Clear current session crate?")) {
                myCrate = [];
                localStorage.removeItem('sdrocer_crate');
                renderCrate();
            }
        }
    </script>
</body>
</html>

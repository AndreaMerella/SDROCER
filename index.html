<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SDROCER</title>
    
    <!-- PWA Link -->
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root {
            --bg: #050505;
            --yellow: #FFD700;
            --panel: #111;
            --font: 'Helvetica Neue', Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: var(--font); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* THE YELLOW TEXT LOGO */
        header { padding: 30px 20px; background: #000; border-bottom: 1px solid #222; text-align: center; }
        .logo { 
            font-weight: 900; 
            letter-spacing: 8px; 
            color: var(--yellow); 
            font-size: 1.8rem; 
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .engine { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .status-text { font-family: monospace; color: #444; font-size: 0.7rem; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }

        canvas { width: 100%; height: 80px; margin-bottom: 40px; }

        /* ACTION BUTTON */
        .btn-listen {
            width: 200px; height: 200px; border-radius: 50%;
            background: #000; border: 4px solid #222; color: #fff;
            font-size: 1.2rem; font-weight: 900; letter-spacing: 3px; cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .btn-listen.active { 
            border-color: var(--yellow); 
            color: var(--yellow); 
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
            animation: pulse 1s infinite alternate; 
        }
        @keyframes pulse { from { opacity: 0.8; } to { opacity: 1; } }

        /* RESULTS */
        .result-card { display: none; width: 100%; max-width: 400px; background: var(--panel); border: 1px solid #333; padding: 25px; text-align: center; margin-top: 20px; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .track-title { font-size: 1.6rem; font-weight: 900; color: #fff; margin-bottom: 5px; text-transform: uppercase; }
        .track-artist { font-size: 1rem; color: var(--yellow); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* CRATE TRAY */
        .crate-tray { height: 160px; background: #000; border-top: 2px solid #222; padding: 20px; display: flex; gap: 15px; overflow-x: auto; }
        .crate-item { 
            min-width: 130px; background: #0a0a0a; border: 1px solid #333; padding: 15px; 
            border-bottom: 4px solid var(--yellow); display: flex; flex-direction: column; justify-content: flex-end;
        }
        .c-title { font-size: 0.75rem; font-weight: 900; color: #fff; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <header><div class="logo">SDROCER</div></header>

    <main class="engine">
        <div class="status-text" id="ui-status">SYSTEM READY</div>
        <canvas id="visualizer"></canvas>
        <button class="btn-listen" id="listenBtn" onclick="startScanner()">LISTEN</button>

        <div class="result-card" id="resultCard">
            <div class="track-title" id="resTitle">--</div>
            <div class="track-artist" id="resArtist">--</div>
        </div>
    </main>

    <div class="crate-tray" id="crateTray"></div>

    <script>
        const API_KEY = '3a6bd57d80mshf946fc2ae39c0dp13ecb2jsn1a8465611b4b'; 
        let myCrate = JSON.parse(localStorage.getItem('sdrocer_crate')) || [];
        
        const listenBtn = document.getElementById('listenBtn');
        const uiStatus = document.getElementById('ui-status');
        const resultCard = document.getElementById('resultCard');
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');

        renderCrate();

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        async function startScanner() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                listenBtn.innerText = "LISTENING";
                listenBtn.classList.add('active');
                resultCard.style.display = 'none';
                uiStatus.innerText = "CAPTURING AUDIO...";

                const mediaRecorder = new MediaRecorder(stream);
                let chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                
                mediaRecorder.onstop = async () => {
                    uiStatus.innerText = "IDENTIFYING...";
                    listenBtn.innerText = "WAIT";
                    stream.getTracks().forEach(t => t.stop());
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = async () => {
                        const base64 = reader.result.split(',')[1];
                        sendToShazam(base64);
                    };
                };

                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 5000); 
            } catch (err) { 
                alert("Microphone Access Denied. Check Permissions."); 
            }
        }

        async function sendToShazam(base64) {
            try {
                const response = await fetch('https://shazam.p.rapidapi.com/songs/v2/detect', {
                    method: 'POST',
                    headers: { 'X-RapidAPI-Key': API_KEY, 'content-type': 'text/plain' },
                    body: base64
                });
                const data = await response.json();
                if (data.track) {
                    showResult(data.track.title, data.track.subtitle);
                } else {
                    uiStatus.innerText = "NO MATCH FOUND";
                    resetBtn();
                }
            } catch (e) { 
                uiStatus.innerText = "CONNECTION ERROR"; 
                resetBtn(); 
            }
        }

        function showResult(title, artist) {
            listenBtn.style.display = 'none';
            resultCard.style.display = 'block';
            uiStatus.innerText = "TRACK SECURED";
            document.getElementById('resTitle').innerText = title;
            document.getElementById('resArtist').innerText = artist;
            
            myCrate.push({ title, artist });
            localStorage.setItem('sdrocer_crate', JSON.stringify(myCrate));
            renderCrate();
            setTimeout(resetBtn, 5000);
        }

        function resetBtn() {
            listenBtn.style.display = 'flex';
            listenBtn.innerText = "LISTEN";
            listenBtn.classList.remove('active');
            uiStatus.innerText = "SYSTEM READY";
        }

        function renderCrate() {
            document.getElementById('crateTray').innerHTML = myCrate.map(r => `
                <div class="crate-item">
                    <div class="c-title">${r.title}</div>
                    <div style="font-size:0.55rem; color:#666; margin-top:4px;">${r.artist}</div>
                </div>
            `).reverse().join('');
        }
    </script>
</body>
</html>
